experiment:
  name: empirical_macro_stress
  mode: empirical
  seed: 42

empirical:
  series:
    - loader: fred_csv
      path: data/processed/fred_unrate_clean.csv
      series_id: unrate
      date_col: observation_date
      value_col: UNRATE
      transformation: level
    - loader: fred_csv
      path: data/processed/fred_baa10ym_clean.csv
      series_id: baa10ym
      date_col: observation_date
      value_col: BAA10YM
      transformation: level
    - loader: fred_csv
      path: data/processed/fred_kcfsi_clean.csv
      series_id: kcfsi
      date_col: observation_date
      value_col: KCFSI
      transformation: level

analysis:
  threshold_quantile: 0.95
  run_length: 3
  min_observations: 24

outputs:
  directory: outputs/empirical_macro_stress

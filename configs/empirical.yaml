experiment:
  name: empirical_macro_stress
  mode: empirical
  seed: 42

empirical:
  series:
    - loader: local_csv
      path: data/raw/example_equity_index.csv
      series_id: example_equity_index
      transformation: log_return
    - loader: local_csv
      path: data/raw/example_inflation.csv
      series_id: example_inflation
      transformation: level

analysis:
  threshold_quantile: 0.95
  run_length: 3
  min_observations: 24

outputs:
  directory: outputs/empirical_macro_stress
